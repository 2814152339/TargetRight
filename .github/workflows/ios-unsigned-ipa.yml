name: iOS Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build-ios-ipa:
    runs-on: macos-14
    defaults:
      run:
        shell: bash
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Unit Tests
        run: flutter test

      - name: Build iOS app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Pack unsigned ipa
        run: |
          set -euxo pipefail
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Runner-unsigned.ipa Payload
          ls -lah
          test -f Runner-unsigned.ipa

      - name: Prepare artifact
        run: |
          set -euxo pipefail
          mkdir -p ../artifacts
          cp build/ios/ipa/Runner-unsigned.ipa ../artifacts/Runner-unsigned.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jinshi-checkin-ios-unsigned-ipa
          path: artifacts/Runner-unsigned.ipa
          if-no-files-found: error
